---
name: Check Links
on:
  workflow_dispatch:
  schedule:
    - cron: 0 6 * * 1

env:
  PYTHONIOENCODING: utf-8

jobs:
  check-links:
    name: check-links
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Build
        id: checkout-build
        uses: actions/checkout@v7
      - name: Setup Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Get Poetry Version
        id: get-poetry-version
        run: |
          ver=$(python -c "print(open('.poetry-version').read().strip())")
          echo "version=$ver" >> "$GITHUB_OUTPUT"
        shell: bash
      - name: Cache Poetry
        uses: actions/cache@v6
        with:
          path: bin/poetry
          key: >
            poetry-${{ runner.os }}-${{
              steps.get-poetry-version.outputs.version}}
      - name: Check Links
        id: check-links
        run: make check-links
