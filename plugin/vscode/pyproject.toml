[tool.bumpversion]
allow_dirty = true
commit = true
commit_args = "--signoff --gpg-sign --no-verify"
current_version = "1.0.0"
message = "bump(vscode-extension): version {current_version} → {new_version}"
sign_tags = true
tag = true
tag_name = "vscode-extension-v{new_version}"

[[tool.bumpversion.files]]
filename = "package.json"
replace = '"version": "{new_version}"'
search = '"version": "{current_version}"'

[[tool.bumpversion.files]]
filename = "package-lock.json"
replace = '"version": "{new_version}"'
search = '"version": "{current_version}"'

[[tool.bumpversion.files]]
filename = "CHANGELOG.md"
replace = """
[Unreleased](https://github.com/jshwi/docsig/compare/vscode-extension-v{new_version}...HEAD)
------------------------------------------------------------------------

[{new_version}](https://github.com/jshwi/docsig/releases/tag/vscode-extension-v{new_version}) - {now:%Y-%m-%d}\
"""
search = "[Unreleased](https://github.com/jshwi/docsig/compare/vscode-extension-v{current_version}...HEAD)"

[[tool.bumpversion.files]]
filename = "../../README.rst"
replace = "vscode%20extension-v{new_version}"
search = "vscode%20extension-v{current_version}"

[[tool.bumpversion.files]]
filename = "README.md"
replace = "vscode%20extension-v{new_version}"
search = "vscode%20extension-v{current_version}"
